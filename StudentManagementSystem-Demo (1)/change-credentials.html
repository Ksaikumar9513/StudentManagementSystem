<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Change My Credentials</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="navbar">
        <h1>🎓 Change My Credentials</h1>
        <div><a href="admin-dashboard.html">Dashboard</a> <a href="#" id="logoutLink">Logout</a></div>
    </div>

    <div class="container">
        <div class="card auth-card">
            <h2>Update Username / Password</h2>
            <p style="font-size:13px; color:#64748b; margin-bottom:10px;">
                You must confirm your current password to make changes.
            </p>

            <form id="changeForm">
                <label>Current Password</label>
                <input type="password" id="currentPassword" required>

                <label>New Username</label>
                <input type="text" id="newUsername" required>

                <label>New Password <span style="font-weight:400; color:#94a3b8;">(leave blank to keep current password)</span></label>
                <input type="password" id="newPassword" minlength="6">

                <button type="submit">Update Credentials</button>
                <div class="error-msg" id="errorMsg"></div>
                <div class="success-msg" id="successMsg"></div>
            </form>
        </div>
    </div>

    <script src="js/db.js"></script>
    <script src="js/guard.js"></script>
    <script>
        requireRole('admin');
        const session = DB.getSession();

        // Pre-fill with current username
        const usernameField = document.getElementById('newUsername');
        usernameField.value = session.username;

        document.getElementById('changeForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const errorBox = document.getElementById('errorMsg');
            const successBox = document.getElementById('successMsg');
            errorBox.textContent = '';
            successBox.textContent = '';

            const currentPassword = document.getElementById('currentPassword').value;
            const newUsername = usernameField.value;
            const newPassword = document.getElementById('newPassword').value;

            if (newPassword && newPassword.length < 6) {
                errorBox.textContent = 'New password must be at least 6 characters.';
                return;
            }

            const result = await DB.updateAdminCredentials(
                session.username, currentPassword, newUsername, newPassword
            );

            if (result.success) {
                DB.setSession({ role: 'admin', username: result.username });
                successBox.textContent = 'Credentials updated successfully.';
                document.getElementById('currentPassword').value = '';
                document.getElementById('newPassword').value = '';
            } else {
                errorBox.textContent = result.message;
            }
        });

        document.getElementById('logoutLink').addEventListener('click', (e) => {
            e.preventDefault();
            DB.clearSession();
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
