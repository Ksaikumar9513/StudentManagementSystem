<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mark Attendance</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="navbar">
        <h1>🎓 Mark Attendance</h1>
        <div><a href="admin-dashboard.html">Dashboard</a> <a href="#" id="logoutLink">Logout</a></div>
    </div>

    <div class="container">
        <div class="card">
            <h2>Mark Today's Attendance</h2>
            <form id="attendanceForm">
                <label>Student ID</label>
                <input type="number" id="studentId" required>

                <label>Status</label>
                <select id="status">
                    <option value="PRESENT">Present</option>
                    <option value="ABSENT">Absent</option>
                </select>

                <button type="submit">Submit</button>
                <div class="success-msg" id="msg"></div>
            </form>
        </div>
    </div>

    <script src="js/db.js"></script>
    <script src="js/guard.js"></script>
    <script>
        requireRole('admin');

        document.getElementById('attendanceForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const studentId = document.getElementById('studentId').value;
            const status = document.getElementById('status').value;
            DB.markAttendance(studentId, status);
            document.getElementById('msg').textContent = 'Attendance recorded!';
            this.reset();
        });

        document.getElementById('logoutLink').addEventListener('click', (e) => {
            e.preventDefault();
            DB.clearSession();
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
