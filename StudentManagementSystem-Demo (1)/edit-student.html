<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Edit Student</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="navbar">
        <h1>🎓 Edit Student</h1>
        <div><a href="view-students.html">Back to Students</a> <a href="#" id="logoutLink">Logout</a></div>
    </div>

    <div class="container">
        <div class="card auth-card">
            <h2>Edit Student Details</h2>

            <form id="editForm">
                <label>Full Name</label>
                <input type="text" id="fullName" required>

                <label>Email <span style="font-weight:400; color:#94a3b8;">(read-only)</span></label>
                <input type="email" id="email" disabled>

                <label>Phone</label>
                <input type="tel" id="phone" pattern="[0-9]{10}">

                <label>Address</label>
                <textarea id="address" rows="2"></textarea>

                <label>Course</label>
                <select id="courseId" required></select>

                <label>Status</label>
                <select id="status">
                    <option value="ACTIVE">Active</option>
                    <option value="INACTIVE">Inactive</option>
                </select>

                <button type="submit">Save Changes</button>
                <div class="error-msg" id="errorMsg"></div>
                <div class="success-msg" id="successMsg"></div>
            </form>
        </div>
    </div>

    <script src="js/db.js"></script>
    <script src="js/guard.js"></script>
    <script>
        requireRole('admin');

        const params = new URLSearchParams(window.location.search);
        const studentId = Number(params.get('id'));

        if (!studentId) {
            window.location.href = 'view-students.html';
        }

        // Populate course dropdown
        const courseSelect = document.getElementById('courseId');
        DB.getAllCourses().forEach(c => {
            const opt = document.createElement('option');
            opt.value = c.courseId;
            opt.textContent = `${c.courseName} (${c.courseCode})`;
            courseSelect.appendChild(opt);
        });

        // Load student data
        const student = DB.getStudentById(studentId);
        if (!student) {
            document.getElementById('errorMsg').textContent = 'Student not found.';
        } else {
            document.getElementById('fullName').value = student.fullName;
            document.getElementById('email').value = student.email;
            document.getElementById('phone').value = student.phone || '';
            document.getElementById('address').value = student.address || '';
            document.getElementById('courseId').value = student.courseId;
            document.getElementById('status').value = student.status;
        }

        document.getElementById('editForm').addEventListener('submit', function (e) {
            e.preventDefault();

            DB.updateStudent({
                studentId,
                fullName: document.getElementById('fullName').value,
                phone: document.getElementById('phone').value,
                address: document.getElementById('address').value,
                courseId: Number(document.getElementById('courseId').value),
                status: document.getElementById('status').value
            });

            document.getElementById('successMsg').textContent = 'Saved! Redirecting...';
            setTimeout(() => window.location.href = 'view-students.html', 800);
        });

        document.getElementById('logoutLink').addEventListener('click', (e) => {
            e.preventDefault();
            DB.clearSession();
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
