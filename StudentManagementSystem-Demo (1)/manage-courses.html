<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Manage Courses</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="navbar">
        <h1>🎓 Manage Courses</h1>
        <div><a href="admin-dashboard.html">Dashboard</a> <a href="#" id="logoutLink">Logout</a></div>
    </div>

    <div class="container">
        <div class="card">
            <h2>Add New Course</h2>
            <form id="courseForm">
                <label>Course Name</label>
                <input type="text" id="courseName" required>

                <label>Course Code</label>
                <input type="text" id="courseCode" required>

                <label>Duration (years)</label>
                <input type="number" id="durationYears" value="4" required>

                <label>Fees (₹)</label>
                <input type="number" step="0.01" id="fees" required>

                <button type="submit">Add Course</button>
            </form>
        </div>

        <div class="card">
            <h2>All Courses</h2>
            <table>
                <thead>
                    <tr><th>ID</th><th>Name</th><th>Code</th><th>Duration</th><th>Fees</th></tr>
                </thead>
                <tbody id="courseTableBody"></tbody>
            </table>
        </div>
    </div>

    <script src="js/db.js"></script>
    <script src="js/guard.js"></script>
    <script>
        requireRole('admin');

        function loadCourses() {
            const tbody = document.getElementById('courseTableBody');
            tbody.innerHTML = '';
            DB.getAllCourses().forEach(c => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${c.courseId}</td>
                    <td>${c.courseName}</td>
                    <td>${c.courseCode}</td>
                    <td>${c.durationYears} yrs</td>
                    <td>₹${c.fees}</td>
                `;
                tbody.appendChild(row);
            });
        }

        document.getElementById('courseForm').addEventListener('submit', function (e) {
            e.preventDefault();
            DB.addCourse({
                courseName: document.getElementById('courseName').value,
                courseCode: document.getElementById('courseCode').value,
                durationYears: Number(document.getElementById('durationYears').value),
                fees: Number(document.getElementById('fees').value)
            });
            this.reset();
            loadCourses();
        });

        loadCourses();

        document.getElementById('logoutLink').addEventListener('click', (e) => {
            e.preventDefault();
            DB.clearSession();
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
